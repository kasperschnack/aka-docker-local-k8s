services:
  web:
    build: ./app
    ports:
      - "5000:5000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: minsecret
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: minsecret
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
